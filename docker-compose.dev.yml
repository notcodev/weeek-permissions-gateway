services:
  postgres:
    image: postgres:16-alpine
    container_name: wgw_pg_dev
    environment:
      POSTGRES_DB: weeek_perm
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d weeek_perm"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata: {}
