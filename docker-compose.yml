services:
  postgres:
    image: postgres:16-alpine
    container_name: wgw_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-weeek_perm}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-weeek_perm}"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wgw_app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-weeek_perm}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL must be set, e.g. https://gateway.example.com}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      MASTER_KEY_ENC_KEY: ${MASTER_KEY_ENC_KEY:?MASTER_KEY_ENC_KEY must be set}
      FINGERPRINT_HMAC_PEPPER: ${FINGERPRINT_HMAC_PEPPER:?FINGERPRINT_HMAC_PEPPER must be set}
      SUB_KEY_HMAC_PEPPER: ${SUB_KEY_HMAC_PEPPER:?SUB_KEY_HMAC_PEPPER must be set}
      CRON_SECRET: ${CRON_SECRET:?CRON_SECRET must be set}
      WEEEK_API_BASE: ${WEEEK_API_BASE:-https://api.weeek.net/public/v1}
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-90}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    container_name: wgw_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN must be set, e.g. gateway.example.com}
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL must be set}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - internal

volumes:
  pgdata: {}
  caddy_data: {}
  caddy_config: {}

networks:
  internal:
    driver: bridge
